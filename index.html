<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Main JS -->
     <script defer src="./js/script.js"></script>
     
    <!-- Seleção de Ícone -->
    <link rel="icon" type="image/png" sizes="16x16"  href="/favicons/favicon-16x16.png">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="theme-color" content="#ffffff">
    <!-- Fim da Seleção de Ícone -->

    <!-- Definindo o stylesheet dentro do css dentro da pasta css -->
    <link rel="stylesheet" href="./css/style.css">

    <title>Pokédex</title>

</head>
<body>

<main>

    <h1 class="pokemon_data">
        <span class="pokemon_number"></span> - 
        <span class="pokemon_name"></span>
    </h1>

    <form class="class_form">
        <input 
        type="search"
        class="input_search"
        placeholder="Name or Number"
        required/>
    </form>

    <div class="buttons">
        <button class="button btn-prev">Prev &lt</button>
        <button class="button btn-next">Next &gt</button>
    </div>

    <img src="" alt="pokemon imagem" class="pokemon_image">
    <img src="./Imagens/pokedex.png" alt="Pokedex PNG" class="pokedex">

</main>
    
</body>
</html>
